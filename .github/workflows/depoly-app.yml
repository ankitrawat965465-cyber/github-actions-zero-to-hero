
name: Deploy Flask app

on:
  workflow_dispatch:

jobs:
  deploy:
      env: 
          DOCKERHUB_USERNAME : ${{ vars.DOCKERHUB_USER }}

      runs-on: self-hosted

      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: docker compose up -d --build
