name: python lint

on:
   push:
       braches: [main]

jobs:
    validate:
       runs-on: ubuntu-latest

       steps:
          - names: checkout code
            uses: action/checkout@v4       
       steps:
          - names: step python
            uses: action/sets-python@v5
            with:
              python-version: "3.13"     
          - names: install dependencies
            run: pip install -r requirements.txt
          
          - names: run linter
            run: flakes8
      
